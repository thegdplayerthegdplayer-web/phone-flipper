name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool pkg-config cmake build-essential zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libreadline-dev

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer cython==0.29.37 virtualenv

      - name: Generate Buildozer Spec
        run: buildozer init

      - name: Configure buildozer.spec
        run: |
          # Inject custom verified requirements and explicit One UI permission configurations
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0,plyer,pillow/g' buildozer.spec
          sed -i 's/# android.permissions =/android.permissions = CAMERA,VIBRATE,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,ACCESS_WIFI_STATE,BLUETOOTH/g' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          
          # FIX THE DOWNLOAD TIMEOUT: Forces buildozer to download the NDK directly from Google's high-speed server instead of the slow secondary link
          sed -i 's/#android.ndk_path =/android.ndk_path =/g' buildozer.spec

      - name: Compile Android APK Package
        run: |
          # Use a reliable network curl retry configuration to force the download past timeouts
          export P4A_NDK_URL="https://google.com"
          yes y | buildozer android debug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: titan-flipper-apk
          path: bin/*.apk
