name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool pkg-config cmake build-essential zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libreadline-dev

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 virtualenv

      - name: Generate Buildozer Spec
        run: buildozer init

      - name: Configure buildozer.spec
        run: |
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0,plyer,pillow/g' buildozer.spec
          sed -i 's/# android.permissions =/android.permissions = CAMERA,VIBRATE,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,ACCESS_WIFI_STATE,BLUETOOTH/g' buildozer.spec

      - name: Compile Android APK Package
        run: yes y | buildozer android debug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: titan-flipper-apk
          path: bin/*.apk
